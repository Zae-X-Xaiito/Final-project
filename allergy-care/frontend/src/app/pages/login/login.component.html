<div class="max-w-md mx-auto px-6 py-12 bg-white rounded-2xl shadow-sm mt-10">
  <h2 class="text-primary text-3xl font-black mb-6 text-center">Welcome Back</h2>
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
    <div class="flex flex-col gap-1">
      <label class="text-primary font-bold text-sm">Email Address</label>
      <input type="email" formControlName="email" class="w-full h-12 px-4 rounded-xl border border-primary/10 focus:border-primary outline-none" placeholder="Enter your email">
      <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid" class="text-red-500 text-xs mt-1">
        Please enter a valid email address.
      </div>
    </div>
    <div class="flex flex-col gap-1">
      <label class="text-primary font-bold text-sm">Password</label>
      <input type="password" formControlName="password" class="w-full h-12 px-4 rounded-xl border border-primary/10 focus:border-primary outline-none" placeholder="••••••••">
      <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid" class="text-red-500 text-xs mt-1">
        Password is required.
      </div>
    </div>
    <div *ngIf="errorMessage" class="text-red-600 font-bold bg-red-50 p-3 rounded-lg text-sm text-center">
      {{ errorMessage }}
    </div>
    <button type="submit" [disabled]="loginForm.invalid" class="w-full h-14 bg-primary text-white rounded-xl font-bold mt-4 shadow-md hover:bg-primary/90 disabled:opacity-50">
      Log In
    </button>
  </form>
  <p class="text-center text-[#6a7781] mt-6 text-sm">
    Don't have an account? <a routerLink="/register" class="text-primary font-bold">Sign Up</a>
  </p>
</div>
