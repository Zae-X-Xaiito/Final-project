<div class="max-w-md mx-auto px-6 py-12 bg-white rounded-2xl shadow-sm mt-10">
  <h2 class="text-primary text-3xl font-black mb-6 text-center">Create Account</h2>
  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
    <div class="flex flex-col gap-1">
      <label class="text-primary font-bold text-sm">Full Name</label>
      <input type="text" formControlName="fullName" class="w-full h-12 px-4 rounded-xl border border-primary/10 focus:border-primary outline-none" placeholder="John Doe">
    </div>
    <div class="flex flex-col gap-1">
      <label class="text-primary font-bold text-sm">Email Address</label>
      <input type="email" formControlName="email" class="w-full h-12 px-4 rounded-xl border border-primary/10 focus:border-primary outline-none" placeholder="email@example.com">
    </div>
    <div class="flex flex-col gap-1">
      <label class="text-primary font-bold text-sm">Password</label>
      <input type="password" formControlName="password" class="w-full h-12 px-4 rounded-xl border border-primary/10 focus:border-primary outline-none" placeholder="••••••••">
    </div>
    <div *ngIf="errorMessage" class="text-red-600 bg-red-50 p-3 rounded-lg text-sm text-center">
      {{ errorMessage }}
    </div>
    <button type="submit" [disabled]="registerForm.invalid" class="w-full h-14 bg-primary text-white rounded-xl font-bold mt-4 shadow-md hover:bg-primary/90 disabled:opacity-50">
      Register
    </button>
  </form>
  <p class="text-center text-[#6a7781] mt-6 text-sm">
    Already have an account? <a routerLink="/login" class="text-primary font-bold">Log In</a>
  </p>
</div>
