<header class="sticky top-0 z-10 bg-white border-b border-slate-200 px-4 py-4 flex items-center justify-between">
  <button class="flex items-center justify-center p-2 rounded-full hover:bg-slate-100 transition-colors" routerLink="/">
    <span class="material-symbols-outlined text-primary">arrow_back</span>
  </button>
  <h1 class="text-lg font-bold tracking-tight text-center flex-1">Symptom Input</h1>
  <div class="w-10"></div>
</header>

<main class="flex-1 overflow-y-auto pb-32">
  <div class="px-4 py-6">
    <div class="relative group">
      <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
        <span class="material-symbols-outlined text-slate-400 group-focus-within:text-primary transition-colors">search</span>
      </div>
      <input class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-xl bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-sm" 
             placeholder="Search symptoms (e.g., itchy throat)..." type="text"
             [formControl]="searchControl"/>
    </div>
  </div>

  <div class="px-4">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-500">Common Symptoms</h2>
      <span class="text-xs font-medium text-primary">Select multiple</span>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div *ngFor="let symptom of commonSymptoms" 
           (click)="toggleSymptom(symptom.id)"
           [class]="'bg-white border rounded-xl p-4 flex flex-col items-center justify-center text-center cursor-pointer transition-all active:scale-95 group relative ' + (isSymptomSelected(symptom.id) ? 'border-2 border-primary bg-primary/5' : 'border-slate-200 hover:border-primary/50')">
        <div *ngIf="isSymptomSelected(symptom.id)" class="absolute top-2 right-2">
          <span class="material-symbols-outlined text-primary text-lg font-bold">check_circle</span>
        </div>
        <div [class]="'w-12 h-12 rounded-full flex items-center justify-center mb-3 transition-colors ' + (isSymptomSelected(symptom.id) ? 'bg-primary/20' : 'bg-primary/10 group-hover:bg-primary/20')">
          <span class="material-symbols-outlined text-primary">{{ symptom.icon }}</span>
        </div>
        <span class="text-sm font-medium">{{ symptom.label }}</span>
      </div>
    </div>

    <div class="mt-8 mb-4">
      <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-500 mb-4">Manual Input</h2>
      <textarea [formControl]="manualDescription" 
                rows="3" 
                class="w-full p-4 border border-slate-200 rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all text-sm" 
                placeholder="Describe other symptoms..."></textarea>
    </div>
  </div>
</main>

<div class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-md border-t border-slate-200 flex flex-col gap-3 z-20">
  <button (click)="onSubmit()" 
          [disabled]="isSubmitting || !hasSelection()" 
          class="w-full bg-primary text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/25 active:scale-[0.98] transition-all flex items-center justify-center gap-2 disabled:opacity-50">
    <span>{{ isSubmitting ? 'Analyzing...' : 'Analyze Symptoms' }}</span>
    <span *ngIf="selectedSymptomIds.length > 0" class="bg-white/20 px-2 py-0.5 rounded text-xs font-medium">
      {{ selectedSymptomIds.length }} Selected
    </span>
  </button>
  
  <nav class="flex justify-around items-center pt-2">
    <a routerLink="/" class="flex flex-col items-center gap-1 text-slate-400">
      <span class="material-symbols-outlined">home</span>
      <span class="text-[10px] font-medium">Home</span>
    </a>
    <a routerLink="/symptom-log" class="flex flex-col items-center gap-1 text-primary">
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">stethoscope</span>
      <span class="text-[10px] font-bold">Checker</span>
    </a>
    <a routerLink="/history" class="flex flex-col items-center gap-1 text-slate-400">
      <span class="material-symbols-outlined">history</span>
      <span class="text-[10px] font-medium">History</span>
    </a>
  </nav>
</div>
